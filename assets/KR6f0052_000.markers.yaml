  - {type: variant, offset: 9744, length: 115, content: 問：受戒而犯，何如不受不犯。答：《瓔珞》云「有戒而犯，勝無戒不犯。有犯名菩薩，無犯名外道。」問：五戒有受一分，乃至具足受五。菩薩戒云何？答：《瓔珞》云「十重戒中有受一分名一分菩薩，乃至二分三分。若受十分名具足受戒。十重有犯無悔，得使重受。八萬四千威儀戒，盡名為輕，有犯得使悔過，對冠註曰首手古多通用，手＝首ィ【原】手【大】，首【校異-原】，冠註曰首手古多通用手首冠註曰首手古多通用便滅。」, 原: ''}
