  - {type: variant, offset: 11094, length: 317, content: 一切煩惱，除無明見，說為有愛＋（苦）【乙】愛【大】，愛苦【乙】愛愛苦。若就簡＝脊【乙】簡【大】，脊【乙】簡脊下說之，應名無色愛；若隨所取，應名心愛。但今為破患，故名有愛。外道多取無色界中以為涅槃，今為破之，故名有耳。有者，謂生死三有之法，故名為有。又總論五鈍使，以愛為主，能感欲界果報者，名為欲愛。以愛為主，能感色界果報者，名為色愛。以愛為主，能感無色界果報者，名為有愛。潤業潤生，愛結最強，故偏說愛。無有明解。冠註曰染污如之上下恐文脫或字誤染污如此，目無明。第二得名門。若依初解，見於一理名見一處，此從能治得名。若依後意，五利煩惱名見，見道時一切併斷，名見一處住地。此從能治所治合解＝得【乙】解【大】，得【乙】解得名也。若四住地為二位，謂見與愛。離愛為三，以見為一，故名見一處住地，此則當體從處得名。餘三住地當體立名，後一以過患為目。三釋之中，以後意為正。所以然者，今釋四住煩惱，且應從惑立名，豈得就解及惑合釋也。《瓔珞經》下卷釋五住地，眾生識始起一想，住於緣，順第一義諦起名善，背第一, 原: ''}
