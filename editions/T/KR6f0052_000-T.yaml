front:
  text: 雕勝鬘寶窟敘原夫所謂一乘之大車者則是法王之寶輅也是以萬德珍琛以校嚴其高廣四辯鈴鐸以縣列其旁邊欄楯總持幰蓋悲捨禪綩以蓐寂枕以休華纓嚲垂四來舉足歸仰之憙寶繩絞絡群黎寧有愛見之愆儐則駢田奉崇牛則𦛚䐺般若況夫家且富豐不偏其施乘豈窮匱無量其籌何其盛哉何其偉哉然夫蒙庶冠癡佩嬰常舞色味之宅驂疑駕惑長驅生死之原至如饕餮榮聲安寤熱焰鏡像膠黐身世未省漂草爨茅其靡識火坑胡暇論寶輅於焉我法王自手擎四鉢而鹿園之教茲基訖身臥雙林而象喻之誥聿極凡鸞音興響金彩移輝皆無非憫其嚚頑悽其矇瞍者矣爾乃妙吉遍吉之諸髦翊輔其化西方東方之群傑贊成其治以故或恩或讎皆是益物遭歎遭呵總為施權要唯所以欲令辟癡冠決嬰佩駕大輅驅廣衢者耳茲有勝鬘夫人者後宮維蹤本地誰得而測柔淑乃質慈悲宜應為殊若夫踰闍信至之晨虛空像現之日寄緣興教託事契機狐膽外魔忽壞蘭儀之宣吐獅吼了義無畏蓮眸之照臨實似周朝亂臣之一人寧匪祇園影響之巨擘其經號曰勝鬘獅子吼一乘大方便大方廣也夫獅子吼者是一向記說自非厥理之終窮誰獲其說之決定一乘也者唯一佛乘是為真實大方便也者為說種種是云權巧蓋夫無乘而乘乘無所乘稱之一乘無運而運運無所運即是真運唯其無所運是以無所不運唯其無所乘是以無所不乘其非若斯妙玄指之言大方廣將以何稱之者乎但至理幽淵奉之難入茫茫歎喟譯語古簡讀者不進往往惋嗟唐初有嘉祥藏大師者胄遐方而誕秀協川嶽而稟神襲龍樹之芳猷探鷲峰之祕旨論鋒共迦旃爭銳亮軼秋蟬智囊與舍利競儲麗譬春鳥蓋是滅後荃宰法門英規者也於是歎微言之已絕傷頹風之不振抗言動論朱紫教理發意吐語涇渭指歸乃造疏若干卷顯此真詮以洞明立言十萬餘發茲玄旨而煥炳未論深之者便開金藏即亦繙之者真窺寶窟庸非驚曉醉狂指眎寶輅者耶然夫請流吾邦固過萬重之濤瀾傳至今日亦經千餘之星霜華夏既已歸烏有之家桑域未曾入回祿之手雖然書寫襲祕未澤學教之乾吭精藍寶藏寧息慕古之延領矧且蒸濕恒慮蟫蝕詎防茲某夙奉此經心庶湛邃曾獲斯記懷渙層氷乃意既噵或里或田何廢書肆亦聞若樹若石豈擇棗梨於是躳自不量竊企廣布屢事讎正猶恐剩魯魚之塵仍命剞劂且喜免潦鶴之瑾所冀者披奉男女同共締乎來緣攝受仁賢與俱駕乎一乘云爾元祿十六年季冬之吉沙門道空和南敘
